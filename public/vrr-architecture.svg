  <path d="M776 280H820" stroke="#4DD0E1" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1150 280H1194" stroke="#4DD0E1" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
