  </defs>

  <rect width="1600" height="900" rx="28" fill="url(#bg)"/>
  <circle cx="132" cy="130" r="180" fill="#0EA5E9" fill-opacity="0.08"/>
  <circle cx="1440" cy="760" r="240" fill="#22C55E" fill-opacity="0.08"/>

  <text x="90" y="92" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="44" font-weight="700">Vendor Registration Request (VRR)</text>
  <text x="90" y="132" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="24">Power Platform architecture for vendor onboarding, verification, SAP registration, and reporting</text>

  <g>
