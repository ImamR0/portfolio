    <text x="122" y="276" fill="#67E8F9" font-family="Segoe UI, Arial, sans-serif" font-size="21">Request Initiator</text>
    <text x="122" y="316" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="21">- Create vendor registration request</text>
    <text x="122" y="348" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="21">- Upload forms and supporting documents</text>
