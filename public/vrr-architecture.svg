    <text x="850" y="276" fill="#67E8F9" font-family="Segoe UI, Arial, sans-serif" font-size="21">Workflow Engine</text>
    <text x="850" y="316" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="21">- Route approval and verification stages</text>
    <text x="850" y="348" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="21">- Reminders, progress updates, and surveys</text>
