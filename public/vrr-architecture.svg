    <text x="680" y="576" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="21">- Store requests, status, and metadata</text>
    <text x="680" y="608" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="21">- Store supporting documents</text>
