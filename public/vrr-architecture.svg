  <path d="M985 370V450" stroke="#4DD0E1" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1270 370V470" stroke="#4DD0E1" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M400 620V690" stroke="#4DD0E1" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M970 640V690H1210" stroke="#4DD0E1" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M550 545H650" stroke="#4DD0E1" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M970 545H1090" stroke="#4DD0E1" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>

  <text x="592" y="428" fill="#A5F3FC" font-family="Segoe UI, Arial, sans-serif" font-size="20">submit and track</text>
  <text x="1010" y="430" fill="#A5F3FC" font-family="Segoe UI, Arial, sans-serif" font-size="20">workflow and status</text>
  <text x="1290" y="430" fill="#A5F3FC" font-family="Segoe UI, Arial, sans-serif" font-size="20">admin review</text>
  <text x="560" y="534" fill="#A5F3FC" font-family="Segoe UI, Arial, sans-serif" font-size="20">document analysis</text>
  <text x="990" y="534" fill="#A5F3FC" font-family="Segoe UI, Arial, sans-serif" font-size="20">registered in SAP</text>
  <text x="423" y="668" fill="#A5F3FC" font-family="Segoe UI, Arial, sans-serif" font-size="20">notifications and survey</text>
  <text x="1020" y="680" fill="#A5F3FC" font-family="Segoe UI, Arial, sans-serif" font-size="20">weekly reporting</text>

  <rect x="92" y="840" width="1416" height="8" rx="4" fill="url(#accent)" fill-opacity="0.8"/>
