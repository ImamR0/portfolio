    <text x="150" y="734" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Notifications and Survey</text>
    <text x="150" y="770" fill="#67E8F9" font-family="Segoe UI, Arial, sans-serif" font-size="21">Automated Communication</text>
    <text x="150" y="804" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="21">- Reminders, progress updates, and follow-up survey</text>
  </g>

